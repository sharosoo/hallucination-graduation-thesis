{
  "version": 1,
  "registry_name": "paired_discriminative_experiment_datasets",
  "experiment_dataset_policy": {
    "dataset_contract": "single_paired_discriminative_experiment_dataset",
    "active_datasets": [
      "TruthfulQA",
      "HaluEval-QA"
    ],
    "candidate_rows_per_prompt": 2,
    "candidate_policy": "Each prompt contributes one dataset-provided correct candidate and one dataset-provided incorrect or hallucinated candidate. Candidates are fixed before model scoring; no answer is generated for later correctness labeling.",
    "excluded_active_datasets": [
      "TriviaQA",
      "Natural Questions",
      "HotpotQA",
      "FEVER",
      "BioASQ"
    ],
    "exclusion_reason": "Excluded datasets do not provide clean dataset-level correct/hallucinated candidate pairs for the active thesis path."
  },
  "mandatory_core_datasets": [
    "TruthfulQA",
    "HaluEval-QA"
  ],
  "label_policy": {
    "supervised_target": {
      "field": "is_hallucination",
      "source": "dataset annotation",
      "binary": true
    },
    "primary_analysis_axis": "corpus_axis_bin",
    "sensitivity_analysis_axes": ["corpus_axis_bin_5", "corpus_axis_bin_10"],
    "row_level_output": {
      "required_fields": ["is_hallucination", "is_correct", "candidate_label"],
      "notes": "Thesis-valid supervised target is annotation-backed is_hallucination. Operational TypeLabel ontology has been removed; corpus axis bins drive condition-aware analysis."
    },
    "analysis_se_bins": {
      "scheme_name": "semantic_entropy_threshold_focus_bins",
      "analysis_only": true,
      "spans": "[0, +inf)",
      "special_attention_thresholds": [
        0.1,
        0.5
      ],
      "bins": [
        {
          "bin_id": "se_eq_0",
          "lower_bound": 0.0,
          "lower_inclusive": true,
          "upper_bound": 0.0,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Exact zero bucket for crossover analysis."
        },
        {
          "bin_id": "se_gt_0_to_0_05",
          "lower_bound": 0.0,
          "lower_inclusive": false,
          "upper_bound": 0.05,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Low-range analysis bin below the SE=0.1 threshold, excluding exact zero."
        },
        {
          "bin_id": "se_0_05_to_0_10",
          "lower_bound": 0.05,
          "lower_inclusive": false,
          "upper_bound": 0.1,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Threshold-focused analysis bin ending at the SE=0.1 cutoff."
        },
        {
          "bin_id": "se_0_10_to_0_20",
          "lower_bound": 0.1,
          "lower_inclusive": false,
          "upper_bound": 0.2,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "First ambiguous incorrect analysis bin above 0.1."
        },
        {
          "bin_id": "se_0_20_to_0_30",
          "lower_bound": 0.2,
          "lower_inclusive": false,
          "upper_bound": 0.3,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Analysis-only crossover sensitivity bin."
        },
        {
          "bin_id": "se_0_30_to_0_40",
          "lower_bound": 0.3,
          "lower_inclusive": false,
          "upper_bound": 0.4,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Analysis-only crossover sensitivity bin."
        },
        {
          "bin_id": "se_0_40_to_0_50",
          "lower_bound": 0.4,
          "lower_inclusive": false,
          "upper_bound": 0.5,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Threshold-focused analysis bin ending at the SE=0.5 cutoff."
        },
        {
          "bin_id": "se_0_50_to_0_60",
          "lower_bound": 0.5,
          "lower_inclusive": false,
          "upper_bound": 0.6,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "First high-diversity analysis bin above 0.5."
        },
        {
          "bin_id": "se_0_60_to_0_70",
          "lower_bound": 0.6,
          "lower_inclusive": false,
          "upper_bound": 0.7,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Analysis-only high-diversity sensitivity bin."
        },
        {
          "bin_id": "se_0_70_to_0_80",
          "lower_bound": 0.7,
          "lower_inclusive": false,
          "upper_bound": 0.8,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Analysis-only high-diversity sensitivity bin."
        },
        {
          "bin_id": "se_0_80_to_0_90",
          "lower_bound": 0.8,
          "lower_inclusive": false,
          "upper_bound": 0.9,
          "upper_inclusive": true,
          "includes_upper_bound": true,
          "note": "Analysis-only high-diversity sensitivity bin."
        },
        {
          "bin_id": "se_0_90_plus",
          "lower_bound": 0.9,
          "lower_inclusive": false,
          "upper_bound": null,
          "upper_inclusive": false,
          "includes_upper_bound": false,
          "note": "Open-ended tail bin covering the rest of [0, +inf)."
        }
      ],
      "notes": "These SE bins support analysis-only crossover and threshold sensitivity reporting. They are not the supervised target."
    }
  },
  "datasets": [
    {
      "name": "TruthfulQA",
      "role": "core",
      "hf_id": "truthful_qa",
      "config": "generation",
      "split": "validation",
      "split_id": "truthfulqa_validation",
      "target_sample_count": 817,
      "seed": 13,
      "candidate_pair_policy": {
        "type": "dataset_provided_deterministic_correct_incorrect_pair",
        "source_fields": {
          "correct_candidate_source": "correct_answers[]",
          "incorrect_candidate_source": "incorrect_answers[]"
        },
        "selection": {
          "correct_candidate": "Select exactly one deterministic correct candidate from dataset-provided correct_answers[] per prompt.",
          "incorrect_candidate": "Select exactly one deterministic incorrect/hallucinated candidate from dataset-provided incorrect_answers[] per prompt.",
          "determinism": "Use the configured dataset seed and stable prompt identity so the same prompt always yields the same correct and incorrect candidate."
        },
        "candidate_rows_per_prompt": 2
      },
      "label_source": {
        "type": "dataset_provided_candidate_pair",
        "correct_candidate_source": "correct_answers[]",
        "incorrect_candidate_source": "incorrect_answers[]",
        "details": "TruthfulQA dataset-provided correct_answers[] and incorrect_answers[] create one deterministic correct and one deterministic incorrect/hallucinated candidate per prompt."
      },
      "label_policy": {
        "correctness_judgment": "Dataset-provided candidate role decides correctness: selected correct_answers[] candidate is correct; selected incorrect_answers[] candidate is incorrect/hallucinated.",
        "supervised_target": "annotation-backed is_hallucination",
        "primary_analysis_axis": "corpus_axis_bin (3-bin) with corpus_axis_bin_5 / corpus_axis_bin_10 sensitivity",
        "row_level_output": "Each row carries is_hallucination, is_correct, candidate_label, plus corpus axis bin metadata; operational TypeLabel ontology is removed."
      },
      "notes": "Mandatory active paired dataset. Loader must build fixed candidate rows from dataset-provided correct_answers[] and incorrect_answers[] without generated-answer correctness labeling."
    },
    {
      "name": "HaluEval-QA",
      "role": "core",
      "hf_id": "pminervini/HaluEval",
      "config": "qa",
      "split": "data",
      "split_id": "halueval_qa_data",
      "target_sample_count": 5000,
      "seed": 23,
      "candidate_pair_policy": {
        "type": "dataset_provided_right_hallucinated_pair",
        "source_fields": {
          "correct_candidate_source": "right_answer",
          "hallucinated_candidate_source": "hallucinated_answer"
        },
        "selection": {
          "correct_candidate": "Use dataset-provided right_answer directly.",
          "incorrect_candidate": "Use dataset-provided hallucinated_answer directly.",
          "determinism": "No synthetic candidate generation; source fields define the fixed pair."
        },
        "candidate_rows_per_prompt": 2
      },
      "label_source": {
        "type": "dataset_provided_candidate_pair",
        "correct_candidate_source": "right_answer",
        "incorrect_candidate_source": "hallucinated_answer",
        "details": "HaluEval-QA dataset-provided right_answer and hallucinated_answer are used directly as the fixed correct and hallucinated candidates."
      },
      "label_policy": {
        "correctness_judgment": "Dataset-provided candidate role decides correctness: right_answer is correct; hallucinated_answer is incorrect/hallucinated.",
        "supervised_target": "annotation-backed is_hallucination",
        "primary_analysis_axis": "corpus_axis_bin (3-bin) with corpus_axis_bin_5 / corpus_axis_bin_10 sensitivity",
        "row_level_output": "Each row carries is_hallucination, is_correct, candidate_label, plus corpus axis bin metadata; operational TypeLabel ontology is removed."
      },
      "notes": "Mandatory active paired dataset. Loader must use right_answer and hallucinated_answer directly without generated-answer correctness labeling."
    }
  ]
}
