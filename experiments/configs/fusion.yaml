{
  "version": 2,
  "method_name": "Corpus-Conditioned Hallucination Metric Reliability Study",
  "binary_target": {
    "field": "is_hallucination",
    "fallback": "not is_correct",
    "archived_label_not_primary": true
  },
  "evaluation": {
    "primary_split": "leave_one_dataset_out",
    "prefer_dataset_level_visibility": true,
    "headline_scope": "aggregate_across_dataset_holdouts",
    "dataset_order": [
      "HaluEval-QA",
      "TruthfulQA"
    ],
    "bin_schemes": {
      "corpus_axis_bin": [
        "low_support",
        "medium_support",
        "high_support"
      ],
      "corpus_axis_bin_5": [
        "very_low_support",
        "low_support",
        "mid_support",
        "high_support",
        "very_high_support"
      ]
    }
  },
  "baselines": [
    {
      "name": "SE-only",
      "kind": "single_signal",
      "signal": "semantic_entropy_score"
    },
    {
      "name": "Energy-only",
      "kind": "single_signal",
      "signal": "semantic_energy_score",
      "requires_energy": true
    },
    {
      "name": "logit-diagnostic-only",
      "kind": "logistic_feature_set",
      "feature_set": "logit_diagnostic_only"
    },
    {
      "name": "corpus-axis-only",
      "kind": "single_signal",
      "signal": "corpus_risk_score"
    },
    {
      "name": "global learned fusion without corpus axis",
      "kind": "logistic_feature_set",
      "feature_set": "global_without_corpus"
    },
    {
      "name": "global learned fusion with corpus axis",
      "kind": "logistic_feature_set",
      "feature_set": "global_with_corpus"
    },
    {
      "name": "corpus-bin feature selection",
      "kind": "corpus_bin_feature_selection",
      "bin_field": "corpus_axis_bin",
      "feature_pool": "bin_feature_pool"
    },
    {
      "name": "corpus-bin weighted fusion",
      "kind": "corpus_bin_weighted_fusion",
      "bin_field": "corpus_axis_bin",
      "feature_set": "bin_weighted_fusion"
    },
    {
      "name": "axis-interaction logistic fusion",
      "kind": "axis_interaction_logistic_fusion",
      "feature_set": "interaction_base",
      "axis_features": [
        "coverage_score",
        "entity_frequency_axis",
        "entity_pair_cooccurrence_axis"
      ]
    },
    {
      "name": "sklearn LR (with corpus)",
      "kind": "sklearn_feature_set",
      "feature_set": "global_with_corpus",
      "learner": "sklearn_logistic",
      "C": 1.0,
      "penalty": "l2",
      "solver": "lbfgs",
      "max_iter": 2000,
      "standardize": true
    },
    {
      "name": "sklearn random forest (with corpus)",
      "kind": "sklearn_feature_set",
      "feature_set": "global_with_corpus",
      "learner": "sklearn_random_forest",
      "n_estimators": 300,
      "max_depth": null,
      "min_samples_leaf": 5,
      "n_jobs": -1,
      "standardize": false
    },
    {
      "name": "sklearn random forest (no corpus)",
      "kind": "sklearn_feature_set",
      "feature_set": "global_without_corpus",
      "learner": "sklearn_random_forest",
      "n_estimators": 300,
      "max_depth": null,
      "min_samples_leaf": 5,
      "n_jobs": -1,
      "standardize": false
    },
    {
      "name": "sklearn gradient boosting (with corpus)",
      "kind": "sklearn_feature_set",
      "feature_set": "global_with_corpus",
      "learner": "sklearn_gradient_boosting",
      "n_estimators": 200,
      "learning_rate": 0.05,
      "max_depth": 3,
      "standardize": false
    },
    {
      "name": "sklearn gradient boosting (no corpus)",
      "kind": "sklearn_feature_set",
      "feature_set": "global_without_corpus",
      "learner": "sklearn_gradient_boosting",
      "n_estimators": 200,
      "learning_rate": 0.05,
      "max_depth": 3,
      "standardize": false
    },
    {
      "name": "sklearn SVM rbf (with corpus)",
      "kind": "sklearn_feature_set",
      "feature_set": "global_with_corpus",
      "learner": "sklearn_svm",
      "C": 1.0,
      "kernel": "rbf",
      "gamma": "scale",
      "standardize": true
    }
  ],
  "learned_fusion": {
    "optimizer": "stdlib_logistic_l2",
    "standardize": true,
    "l2_lambda": 0.1,
    "learning_rate": 0.2,
    "max_iterations": 1500,
    "tolerance": 1e-06,
    "feature_sets": {
      "logit_diagnostic_only": [
        "semantic_energy_diagnostic",
        "mean_negative_log_probability",
        "logit_variance",
        "confidence_margin"
      ],
      "global_without_corpus": [
        "semantic_entropy_score",
        "semantic_entropy_cluster_count",
        "semantic_energy_score",
        "semantic_energy_sample",
        "semantic_energy_diagnostic",
        "mean_negative_log_probability",
        "logit_variance",
        "confidence_margin"
      ],
      "global_with_corpus": [
        "semantic_entropy_score",
        "semantic_entropy_cluster_count",
        "semantic_energy_score",
        "semantic_energy_sample",
        "semantic_energy_diagnostic",
        "mean_negative_log_probability",
        "logit_variance",
        "confidence_margin",
        "entity_frequency_axis",
        "entity_pair_cooccurrence_axis",
        "low_frequency_entity_flag",
        "zero_cooccurrence_flag",
        "coverage_score",
        "corpus_risk_score"
      ],
      "bin_weighted_fusion": [
        "semantic_entropy_score",
        "semantic_energy_score",
        "mean_negative_log_probability",
        "corpus_risk_score"
      ],
      "interaction_base": [
        "semantic_entropy_score",
        "semantic_energy_score",
        "semantic_energy_diagnostic",
        "mean_negative_log_probability",
        "confidence_margin"
      ]
    },
    "feature_pools": {
      "bin_feature_pool": [
        "semantic_entropy_score",
        "semantic_energy_score",
        "semantic_energy_diagnostic",
        "mean_negative_log_probability",
        "logit_variance",
        "confidence_margin",
        "corpus_risk_score"
      ]
    },
    "forbidden_features": [
      "label",
      "is_hallucination",
      "is_correct",
      "candidate_label",
      "gold_answer",
      "gold_answers",
      "correctness_judgment",
      "hidden_state",
      "pc_probe",
      "p_correct"
    ]
  },
  "notes": [
    "All supervised baselines use annotation-backed is_hallucination as the binary target (fallback: not is_correct).",
    "Corpus-bin feature selection and weighted fusion fit bin-specific choices on training folds only before applying to held-out rows.",
    "Per-bin reporting is required for corpus_axis_bin (3-bin primary), corpus_axis_bin_5, and corpus_axis_bin_10 sensitivity, with explicit NA reasons instead of silent bin dropping."
  ]
}
